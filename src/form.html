<!DOCTYPE html>
<html>
    <head>
        <title>Formularz</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <main class="dashboard-container">
        <header>
            <div class="header-left">
                <h1> Jokes APP</h1>
                <nav class="header-nav">
                    <ul>
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="form.html" class="active">Formularz</a></li>
                        <li><a href="details.html">Szczegoly</a></li>
                    </ul>
                </nav>
            </div>
            <div class="header-right">
                <span class="sort-by">Sort by:<strong>TAGS</strong></span>
            </div>
        </header>
        <div class="form-container">
            <form action="#" method="post" class="joke-form">
                <label for="joke-type">Joke Type:</label>
                <input type="text" id="joke-type" name="joke-type" required>

                <label for="joke-content">Joke Content:</label>
                <textarea id="joke-content" name="joke-content" rows="4" required></textarea>

                <button type="submit" class="btn-primary">Add Joke</button>
            </form>
        </div>
        </main> 
    </body>
</html>
